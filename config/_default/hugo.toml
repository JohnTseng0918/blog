theme = "blowfish"
baseURL = "https://johntseng0918.github.io/blog/"
defaultContentLanguage = "en"

enableRobotsTXT = true
enableEmoji = true
titleCaseStyle = "none"
summaryLength = 30
hasCJKLanguage = true

buildDrafts = false
buildFuture = false

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2
  [markup.highlight]
    style = "dracula"
